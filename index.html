<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="weather-card">

        <div class="top-bar">
            <h1>🌦 Weather App</h1>
            <button id="themeToggle">🌙</button>
        </div>

        <div class="search-box">
            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name..."
            >
            <button id="searchBtn">Search</button>
        </div>

        <div id="weatherResult">

            <img id="weatherIcon" src="" alt="Weather Icon">

            <h2 id="cityName">Search a City</h2>

            <div class="weather-info">

                <div class="info-box">
                    <h3 id="temperature">--°C</h3>
                    <p>Temperature</p>
                </div>

                <div class="info-box">
                    <h3 id="humidity">--%</h3>
                    <p>Humidity</p>
                </div>

            </div>

            <!-- NEW SUNRISE & SUNSET SECTION -->
            <div class="weather-info">

                <div class="info-box">
                    <h3 id="sunrise">--:--</h3>
                    <p>🌅 Sunrise</p>
                </div>

                <div class="info-box">
                    <h3 id="sunset">--:--</h3>
                    <p>🌇 Sunset</p>
                </div>

            </div>

            <p id="description">Weather Details</p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
